<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>drew ratliff</title>
    <script>
        // Extremely early head execution to permanently prevent visual Layout Flashes!
        // Places state constraints purely on the HTML tag before the body text even exists.
        if (window.location.search.includes('skip_splash=true')) {
            // Prevent browsers from preserving scroll location so it snaps to the header
            if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
            document.documentElement.classList.add('canvas-instant', 'skip-transitions', 'sequence-active', 'state-drawing-line', 'state-fade-black', 'state-morph-header', 'state-content-visible', 'state-content-fadein');
        }
        // Force scroll home
        window.addEventListener('load', () => window.scrollTo(0, 0));
    </script>
    <!-- Include p5.js, the web equivalent of Processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ponomar&family=Ruslan+Display&family=UnifrakturMaguntia&display=swap"
        rel="stylesheet">
    <style>
        body,
        body,
        html {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* Prevent horizontal scroll */
            background-color: #0f172a;
            /* Slate background */
            font-family: sans-serif;
            transition: background-color 1s ease;
        }

        /* Force-kills all transition animations for instantaneous loading */
        .skip-transitions * {
            transition: none !important;
        }

        /* Permanently overrides canvas slide-in lag if the P5 network script loads too slowly on hot reloads */
        .canvas-instant #canvas-container canvas {
            transition: none !important;
        }

        /* Protects against a single-frame flash when P5 originally instantiates rawly into the DOM before its container is ready */
        canvas:not(#canvas-container canvas) {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
        }

        /* -------------------------------------
           SPLASH HEADER & CANVAS CONTAINER 
        ---------------------------------------*/
        #splash-header {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* crops out the rest of the canvas when shrunk */
            background-color: transparent;
            z-index: 100;
            /* Ensures inner elements like the hamburger stay visibly on top of the open side drawer */
            transition: height 1.2s cubic-bezier(0.77, 0, 0.175, 1);
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #canvas-container canvas {
            display: block;
            /* Allow the canvas graphics to cleanly slide vertically whenever targeted */
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1);
        }

        /* -------------------------------------
           FOREGROUND TITLE OVERLAY 
        ---------------------------------------*/
        .name-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 4rem 6rem;
            background: radial-gradient(ellipse at center, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.4) 40%, rgba(15, 23, 42, 0) 75%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 1.2s cubic-bezier(0.77, 0, 0.175, 1), background 1s ease;
        }

        .name-container:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }

        .name-text {
            font-family: 'Ponomar', 'Ruslan Display', 'UnifrakturMaguntia', serif;
            color: #ffffff;
            font-size: clamp(3rem, 6vw, 6rem);
            font-weight: 400;
            line-height: normal;
            letter-spacing: -0.02em;
            margin: 0;
            text-shadow: 0px 4px 12px rgba(0, 0, 0, 0.4);
            text-align: center;
            display: flex;
            flex-direction: row;
            /* Always horizontal */
            gap: 0.3em;
            align-items: center;
            transition: font-size 1.2s ease;
        }

        /* -------------------------------------
           MASTER DIVIDER LINE
        ---------------------------------------*/
        #master-divider {
            position: absolute;
            left: 0;
            width: 0%;
            /* Starts invisible at 0 width */
            height: 4px;
            background-color: white;
            z-index: 20;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.4);
            /* Transitions for drawing width, and smoothly tracking the morph */
            transition: width 0.8s cubic-bezier(0.85, 0, 0.15, 1),
                top 1.2s cubic-bezier(0.77, 0, 0.175, 1),
                height 1.2s ease;
        }

        /* -------------------------------------
           GENERIC PAGE CONTENT BELOW FOLD
        ---------------------------------------*/
        #page-content {
            min-height: 100vh;
            background-color: #000;
            color: white;
            padding: 4rem 2rem;
            box-sizing: border-box;
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .content-container h2 {
            font-family: 'Ponomar', serif;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #333;
            padding-bottom: 0.5rem;
        }

        .content-container p {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #ccc;
            margin-bottom: 2rem;
        }

        /* -------------------------------------
           HAMBURGER NAVIGATION 
        ---------------------------------------*/
        .hamburger-menu {
            position: absolute;
            top: 45px;
            right: 40px;
            width: 35px;
            height: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            z-index: 20;
            /* Hidden until the splash screen is passed */
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease;
        }

        .hamburger-menu .bar {
            width: 100%;
            height: 4px;
            background-color: white;
            border-radius: 2px;
            transition: all 0.3s ease;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.6);
            /* Helps contrast against bright canvas streaks */
        }

        .hamburger-menu:hover .bar {
            background-color: #ffffff;
            box-shadow: 0px 0px 15px rgba(255, 255, 255, 1);
        }

        /* -------------------------------------
           SIDE DRAWER NAVIGATION 
        ---------------------------------------*/
        .nav-menu {
            position: fixed;
            /* Attach permanently to the viewport */
            top: 0;
            right: 0;
            width: 250px;
            height: 100vh;
            /* Stretch to cover the entire right side of the screen */
            background-color: rgba(15, 23, 42, 0.98);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            padding: 180px 0 2rem 0;
            /* Cleared asymmetrical left/right padding to perfectly horizontally center */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Middle mathematically justifies the links */
            gap: 2rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            transform: translateX(100px);
            /* Start slightly off-screen to the right */
            z-index: 50;
            /* Sits securely underneath the header z-index */
            box-shadow: -10px 0 25px rgba(0, 0, 0, 0.5);
            /* Cast a soft shadow inward against the body */
        }

        .nav-menu.menu-open {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
            /* Glide smoothly into position perfectly flush with the right edge */
        }

        .nav-menu a {
            font-family: 'Ponomar', 'Ruslan Display', 'UnifrakturMaguntia', serif;
            color: #ccc;
            text-decoration: none;
            font-size: 1.4rem;
            /* Slightly bumped up because decorative fonts read smaller */
            text-align: center;

            /* Start hidden and shifted right */
            opacity: 0;
            transform: translateX(30px);

            /* Map transitions cleanly to prevent hover lag */
            transition-property: color, text-shadow, opacity, transform;
            transition-duration: 0.3s, 0.3s, 0.5s, 0.5s;
            transition-timing-function: ease, ease, ease, cubic-bezier(0.77, 0, 0.175, 1);
            transition-delay: 0s;
            /* Reset all delays when menu is closed */
        }

        /* Slide them in securely with staggered delays! */
        .nav-menu.menu-open a {
            opacity: 1;
            transform: translateX(0);
        }

        /* Map specific staggered delays to opacity and transform only */
        .nav-menu.menu-open a:nth-child(1) {
            transition-delay: 0s, 0s, 0.1s, 0.1s;
        }

        .nav-menu.menu-open a:nth-child(2) {
            transition-delay: 0s, 0s, 0.2s, 0.2s;
        }

        .nav-menu.menu-open a:nth-child(3) {
            transition-delay: 0s, 0s, 0.3s, 0.3s;
        }

        .nav-menu.menu-open a:nth-child(4) {
            transition-delay: 0s, 0s, 0.4s, 0.4s;
        }

        .nav-menu a:hover {
            color: #fff;
            text-shadow: 0px 0px 10px rgba(255, 255, 255, 0.8);
        }

        /* =========================================================================
           ANIMATION TIMELINE CLASSES! 
           ========================================================================= */

        .sequence-active .name-container {
            pointer-events: none;
            /* Strip hover dynamics permanently after sequence starts */
        }

        /* STEP 1: Draw the white line accross 100vw */
        .state-drawing-line #master-divider {
            width: 100vw;
        }

        /* STEP 2: The screen natively fades to black */
        .state-fade-black,
        .state-fade-black body {
            background-color: #000 !important;
        }

        /* STEP 3: Header shrink & Translation */
        .state-morph-header #splash-header {
            height: 120px;
        }

        /* Slide the entire massive canvas array upward to strictly perfectly align the graphic vertically so the exact middle sits securely inside the header! */
        .state-morph-header #canvas-container canvas {
            transform: translateY(calc(-60vh + 60px));
        }

        .state-morph-header .name-container {
            /* Jump to top LEFT */
            top: -10px;
            left: -20px;
            /* Shift it into the corner to counteract the padding */
            right: auto;
            transform: translate(0, 0) scale(1);
            padding: 40px 60px;
            /* Keep padding so the radial background has room to blur */
            background: radial-gradient(ellipse at center, rgba(15, 23, 42, 0.95) 0%, rgba(15, 23, 42, 0.5) 45%, rgba(15, 23, 42, 0) 75%);
            cursor: pointer;
            pointer-events: auto;
            /* Restores the ability to physically click the link after the morph finishes! */
        }

        .state-morph-header .name-text {
            font-size: 2.2rem;
            text-shadow: none;
        }

        /* Soften the master divider line in header mode */
        .state-morph-header #master-divider {
            top: 118px !important;
            /* CSS gracefully hijacks the JS tracking and permanently links the border to the 120px header mark! */
            height: 2px;
            box-shadow: none;
            background-color: white;
        }

        /* Fade in the hamburger menu to be clickable */
        .state-morph-header .hamburger-menu {
            opacity: 1;
            pointer-events: auto;
        }

        /* Step 3.5: Put main content onto DOM invisible */
        .state-content-visible #page-content {
            display: block;
        }

        /* STEP 4: Reveal generic content via opacity fade-in */
        .state-content-fadein #page-content {
            opacity: 1;
        }
    </style>
</head>

<body>

    <!-- Hero / Header Area -->
    <header id="splash-header">
        <div id="canvas-container"></div>
        <div class="name-container" id="title-btn">
            <h1 class="name-text">
                <span>drew</span>
                <span>ratliff</span>
            </h1>
        </div>

        <!-- Hamburger Menu Top Right -->
        <div class="hamburger-menu" id="nav-btn">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <!-- Master screen-wide divider line tracking independently -->
        <div id="master-divider"></div>
    </header>

    <!-- Navigation Dropdown Popup (Moved outside of header to prevent canvas crop clipping) -->
    <nav class="nav-menu" id="nav-dropdown">
        <a href="#">Galleries</a>
        <a href="#">Projects</a>
        <a href="#">About Me</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Main Content Area -->
    <main id="page-content">
        <div class="content-container">
            <h2>Welcome</h2>
            <p id="haiku-container"
                style="white-space: pre-line; font-style: italic; font-size: 1.5rem; line-height: 2; padding-top: 1rem; color: #aaa;">
            </p>
        </div>
    </main>

    <script>
        // --- DYNAMIC CANVAS INJECTION ---
        const visualFiles = [
            'sketches/particle_flow.js',
            'sketches/neon_waves.js',
            'sketches/moving_lines.js',
            'sketches/orthogonal_crawler.js'
        ];
        const randomSketch = visualFiles[Math.floor(Math.random() * visualFiles.length)];
        const scriptTag = document.createElement('script');
        scriptTag.src = randomSketch;
        document.body.appendChild(scriptTag);

        // --- RANDOM HAIKU LOGIC ---
        const haikus = [
            "Neon weaves in dark,\nCode blooming into beauty,\nScreen becomes alive.",
            "Chaos framed in light,\nEndless threads of perfect math,\nArt without a hand.",
            "Silent pixels wake,\nFlowing waves of liquid code,\nPainting something new."
        ];
        document.getElementById('haiku-container').innerText = haikus[Math.floor(Math.random() * haikus.length)];

        // --- P5 CANVAS DOM REROUTING HACK ---
        const checkCanvas = setInterval(() => {
            const canvas = document.querySelector('canvas');
            if (canvas && !canvas.closest('#canvas-container')) {
                document.getElementById('canvas-container').appendChild(canvas);
                clearInterval(checkCanvas);
            }
        }, 50);

        // --- INTERACTIVE TIMELINE SCRIPT ---
        const titleBtn = document.getElementById('title-btn');
        const masterDivider = document.getElementById('master-divider');
        let hasTransitioned = false;
        let isHomeButtonActive = false; // Flag safely blocks accidental refresh double-clicks mid-animation

        // --- INSTANT LOAD HOMEPAGE LOGIC ---
        if (window.location.search.includes('skip_splash=true')) {
            // Flags to skip processing click animations 
            hasTransitioned = true;
            isHomeButtonActive = true;

            // Strip the transition block safely after the DOM resolves so hover effects aren't permanently broken!
            setTimeout(() => {
                document.documentElement.classList.remove('skip-transitions');
            }, 100);
        }

        titleBtn.addEventListener('click', () => {
            // Once the entire sequence completes, this button permanently morphs into a Home link!
            if (isHomeButtonActive) {
                window.location.href = window.location.pathname + '?skip_splash=true';
                return;
            }

            if (hasTransitioned) return;
            hasTransitioned = true;

            // PRE-STEP: Calculate exactly where the bottom of the text is
            // Set the master line to sit perfectly tight (2px) below it before it becomes visible!
            const textRect = document.querySelector('.name-text').getBoundingClientRect();
            masterDivider.style.top = (textRect.bottom + 2) + 'px';

            // Force a DOM reflow so the starting top position registers before width expands
            void masterDivider.offsetWidth;

            document.body.classList.add('sequence-active');

            // 1. Draw the white line across exactly 100vw
            document.body.classList.add('state-drawing-line');

            // 2. Wait 600ms, then trigger black body fade underneath the canvas
            setTimeout(() => {
                document.body.classList.add('state-fade-black');
            }, 600);

            // 3. Wait 1200ms, Morph header to top left + make main body visible on the DOM
            setTimeout(() => {
                document.body.classList.add('state-morph-header');
                document.body.classList.add('state-content-visible');
            }, 1200);

            // 4. Wait 1800ms, gracefully fade in all typical website block content
            setTimeout(() => {
                document.body.classList.add('state-content-fadein');
                isHomeButtonActive = true; // The morph is over, so flip the safety logic switch
            }, 1800);
        });

        // --- NAVIGATION MENU TOGGLE ---
        const navBtn = document.getElementById('nav-btn');
        const navDropdown = document.getElementById('nav-dropdown');

        navBtn.addEventListener('click', () => {
            // Only allow interaction once the morph to the header is entirely complete
            if (isHomeButtonActive) {
                navDropdown.classList.toggle('menu-open');
            }
        });
    </script>
</body>

</html>
