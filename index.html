<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>drew ratliff</title>
    <!-- Include p5.js, the web equivalent of Processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ponomar&family=Ruslan+Display&family=UnifrakturMaguntia&display=swap"
        rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Prevent scrollbars */
            background-color: #0f172a;
            /* Slate background */
        }

        canvas {
            display: block;
            /* Remove default inline spacing */
        }

        .name-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Ponomar', 'Ruslan Display', 'UnifrakturMaguntia', serif;
            color: #ffffff;
            font-size: clamp(3rem, 6vw, 6rem);
            font-weight: 400;
            line-height: 0.85;
            /* Tighter vertical spacing for line break */
            letter-spacing: -0.02em;
            /* Tighter letter spacing */
            margin: 0;
            padding: 0;
            z-index: 10;
            pointer-events: none;
            /* Allows the canvas to receive clicks if we add interaction later */
            text-shadow: 0px 4px 12px rgba(0, 0, 0, 0.4);
            /* Slight drop shadow for contrast against lighter particles */
            text-align: center;
            display: flex;
            flex-direction: column;
            /* Stack vertically by default (mobile) */
            align-items: center;
        }

        /* Go back to horizontal inline display for screens larger than 768px */
        @media (min-width: 768px) {
            .name-overlay {
                flex-direction: row;
                gap: 0.3em;
                /* Space between words */
                line-height: normal;
                /* Restore normal line height */
            }
        }
    </style>
</head>

<body>
    <h1 class="name-overlay">
        <span>drew</span>
        <span>ratliff</span>
    </h1>

    <script>
        // List your different p5.js sketches here
        // To add a new one in the future, just code it in the 'sketches' folder and add it to this list!
        const visualFiles = [
            'sketches/particle_flow.js',
            'sketches/neon_waves.js',
            'sketches/moving_lines.js',
            'sketches/orthogonal_crawler.js'
        ];

        // Pick one completely randomly
        const randomSketch = visualFiles[Math.floor(Math.random() * visualFiles.length)];

        // Dynamically load that sketch into the page
        const scriptTag = document.createElement('script');
        scriptTag.src = randomSketch;
        document.body.appendChild(scriptTag);
    </script>
</body>

</html>
