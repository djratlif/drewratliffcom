<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Artwork</title>
    <!-- Include p5.js, the web equivalent of Processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ponomar&family=Ruslan+Display&family=UnifrakturMaguntia&display=swap"
        rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Prevent scrollbars */
            background-color: #0f172a;
            /* Slate background */
        }

        canvas {
            display: block;
            /* Remove default inline spacing */
        }

        .name-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Ponomar', 'Ruslan Display', 'UnifrakturMaguntia', serif;
            color: #ffffff;
            font-size: clamp(3rem, 6vw, 6rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            /* Tighter letter spacing */
            margin: 0;
            padding: 0;
            z-index: 10;
            pointer-events: none;
            /* Allows the canvas to receive clicks if we add interaction later */
            text-shadow: 0px 4px 12px rgba(0, 0, 0, 0.4);
            /* Slight drop shadow for contrast against lighter particles */
            text-align: center;
        }
    </style>
</head>

<body>
    <h1 class="name-overlay">drew ratliff</h1>
    <script>
        // This is a p5.js sketch. It works almost exactly like Processing but in JavaScript!
        let particles = [];
        const numParticles = 300;

        function setup() {
            // Create a canvas that fills the whole browser window
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
            background(222, 47, 16); // Nice dark background

            // Initialize particles
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
        }

        function draw() {
            // Semi-transparent background for a trailing/fade effect
            background(222, 47, 16, 5);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].display();
                particles[i].checkEdges();
            }
        }

        // Handle window resizing dynamically
        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            background(222, 47, 16);
        }

        class Particle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.vel = p5.Vector.random2D(); // Random initial direction
                this.vel.mult(random(0.5, 2));
                this.acc = createVector(0, 0);
                this.r = random(1.5, 4);

                // Select random hues from a specific palette (Cyan to Pink)
                this.h = random([180, 220, 260, 300, 340]);
                this.s = random(70, 100);
                this.b = random(80, 100);
            }

            update() {
                // Use Perlin noise to create organic, flow-field like movement
                let noiseAngle = noise(this.pos.x * 0.003, this.pos.y * 0.003, frameCount * 0.005) * TWO_PI * 4;
                let noiseForce = p5.Vector.fromAngle(noiseAngle);
                noiseForce.mult(0.1);

                this.acc.add(noiseForce);
                this.vel.add(this.acc);
                this.vel.limit(3); // Base speed limit
                this.pos.add(this.vel);
                this.acc.mult(0); // Reset acceleration
            }

            display() {
                noStroke();
                fill(this.h, this.s, this.b, 80); // Semi-transparent colors
                ellipse(this.pos.x, this.pos.y, this.r * 2);
            }

            checkEdges() {
                // Wrap around edges of the screen
                if (this.pos.x > width + this.r) this.pos.x = -this.r;
                if (this.pos.x < -this.r) this.pos.x = width + this.r;
                if (this.pos.y > height + this.r) this.pos.y = -this.r;
                if (this.pos.y < -this.r) this.pos.y = height + this.r;
            }
        }
    </script>
</body>

</html>
